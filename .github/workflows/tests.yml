name: Run Critical Tests

on:
  push:
    branches: [ main, develop, gotcha, "feature/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Set up environment variables (SQLite for testing)
        run: |
          echo "FLASK_ENV=testing" >> $GITHUB_ENV
          echo "SECRET_KEY=test-secret-key-do-not-use-in-production" >> $GITHUB_ENV
          echo "GEO_FILTER_ENABLED=False" >> $GITHUB_ENV
          echo "ENABLE_MFA=False" >> $GITHUB_ENV

      - name: Initialize database
        run: |
          python -c "
          from app import create_app, db
          app = create_app()
          with app.app_context():
              db.create_all()
              print('✅ Database initialized')
          "

      - name: Run Smoke Tests
        run: |
          python -m pytest tests/test_smoke.py -v --tb=short

      - name: Run Unit Tests
        run: |
          python -m pytest tests/test_password_validation.py tests/test_password_policy.py -v --tb=short

      - name: Run Integration Tests (Basic)
        run: |
          # Start Flask app in the background
          python run_demo.py &
          APP_PID=$!
          sleep 3  # Wait for app to start
          
          # Run integration tests
          python -m pytest tests/integration/test_integration.py::TestHealth -v --tb=short --base-url=http://localhost:5000
          
          # Kill the background app
          kill $APP_PID 2>/dev/null || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            .pytest_cache/
            *.xml

      - name: Test Report
        if: always()
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "Tests completed for branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
