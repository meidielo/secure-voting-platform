name: Run Critical Tests

on:
  push:
    branches: [ main, develop, gotcha, "feature/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install psycopg2-binary

      - name: Set up environment variables
        run: |
          echo "FLASK_ENV=testing" >> $GITHUB_ENV
          echo "DATABASE_URL=postgresql://test_user:test_password@localhost:5432/test_db" >> $GITHUB_ENV
          echo "SECRET_KEY=test-secret-key-do-not-use-in-production" >> $GITHUB_ENV
          echo "GEO_FILTER_ENABLED=False" >> $GITHUB_ENV
          echo "ENABLE_MFA=False" >> $GITHUB_ENV

      - name: Wait for PostgreSQL
        run: |
          apt-get update && apt-get install -y postgresql-client
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U test_user; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 1
          done
          echo "PostgreSQL failed to start"
          exit 1

      - name: Initialize database
        run: |
          python -c "
          from app import create_app, db
          app = create_app()
          with app.app_context():
              db.create_all()
              print('✅ Database initialized')
          "

      - name: Run Smoke Tests
        run: |
          python -m pytest tests/test_smoke.py -v --tb=short

      - name: Run Unit Tests
        run: |
          python -m pytest tests/test_password_validation.py tests/test_password_policy.py -v --tb=short

      - name: Run Integration Tests (Basic)
        run: |
          # Start Flask app in the background
          python run_demo.py &
          APP_PID=$!
          sleep 3  # Wait for app to start
          
          # Run integration tests
          python -m pytest tests/integration/test_integration.py::TestHealth -v --tb=short --base-url=http://localhost:5000
          
          # Kill the background app
          kill $APP_PID 2>/dev/null || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            .pytest_cache/
            *.xml

      - name: Test Report
        if: always()
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "Tests completed for branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
