name: Run Critical Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Set up environment variables (SQLite for testing)
        run: |
          echo "DEPLOYMENT_ENV=testing" >> $GITHUB_ENV
          echo "FLASK_ENV=testing" >> $GITHUB_ENV
          echo "SECRET_KEY=test-secret-key-do-not-use-in-production" >> $GITHUB_ENV
          echo "GEO_FILTER_ENABLED=False" >> $GITHUB_ENV
          echo "ENABLE_MFA=False" >> $GITHUB_ENV

      - name: Run Smoke Tests
        run: |
          python -m pytest tests/test_smoke.py -v --tb=short

      - name: Run Unit Tests
        run: |
          python -m pytest tests/test_password_validation.py tests/test_password_policy.py -v --tb=short

      - name: Run Integration Tests (Docker)
        run: |
          # Build and start Docker containers
          echo "🐳 Starting Docker containers..."
          docker compose up -d
          
          # Wait for database to be healthy first
          echo "⏳ Waiting for database to be ready..."
          max_attempts=60
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if docker compose exec -T db mysqladmin ping -h localhost -uroot -prootpass 2>/dev/null | grep -q "mysqld is alive"; then
              echo "✅ Database is ready!"
              break
            fi
            attempt=$((attempt + 1))
            if [ $((attempt % 10)) -eq 0 ]; then
              echo "⏳ Database check attempt $attempt/$max_attempts..."
            fi
            sleep 1
          done
          
          if [ $attempt -ge $max_attempts ]; then
            echo "❌ Database failed to become ready"
            docker compose logs db --tail=50
            exit 1
          fi
          
          # Wait for app to respond to health checks
          echo "⏳ Waiting for app to be ready..."
          max_attempts=120
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            # Check if health endpoint responds with 200
            http_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/healthz 2>/dev/null || echo "000")
            if [ "$http_code" = "200" ]; then
              echo "✅ App is ready! (HTTP $http_code)"
              break
            fi
            attempt=$((attempt + 1))
            if [ $((attempt % 20)) -eq 0 ]; then
              echo "⏳ App health check attempt $attempt/$max_attempts... (current HTTP $http_code)"
            fi
            sleep 1
          done
          
          if [ $attempt -ge $max_attempts ]; then
            echo "❌ App failed to become ready after ${max_attempts}s"
            echo "🔍 Checking Docker logs:"
            echo "=== APP LOGS ==="
            docker compose logs web --tail=50
            echo "=== WAF LOGS ==="
            docker compose logs waf --tail=30
            echo "=== DB LOGS ==="
            docker compose logs db --tail=20
            exit 1
          fi
          
          # Add small buffer for full initialization
          sleep 2
          
          # Run health checks first
          echo "🏥 Running health checks..."
          python -m pytest tests/integration/test_integration.py::TestHealthChecks -v --tb=short --base-url=http://localhost || TEST_RESULT=$?
          
          if [ ${TEST_RESULT:-0} -eq 0 ]; then
            # Run full integration tests
            echo "🧪 Running integration tests..."
            python -m pytest tests/integration/test_integration.py -v --tb=short --base-url=http://localhost || TEST_RESULT=$?
          fi
          
          # Run WAF security tests if all prior tests passed
          if [ ${TEST_RESULT:-0} -eq 0 ]; then
            echo "🔒 Running WAF security tests..."
            python -m pytest tests/integration/test_waf_security.py -v --tb=short --base-url=http://localhost || WAF_RESULT=$?
            TEST_RESULT=${WAF_RESULT:-${TEST_RESULT}}
          fi
          
          # Show Docker logs for debugging if tests failed
          if [ ${TEST_RESULT:-0} -ne 0 ]; then
            echo "❌ Tests failed. Dumping Docker logs for debugging..."
            echo "=== APP LOGS (last 100 lines) ==="
            docker compose logs web --tail=100
            echo "=== WAF LOGS (last 50 lines) ==="
            docker compose logs waf --tail=50
            echo "=== DB LOGS (last 30 lines) ==="
            docker compose logs db --tail=30
          fi
          
          # Cleanup
          docker compose down -v
          
          exit ${TEST_RESULT:-0}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            .pytest_cache/
            *.xml

      - name: Test Report
        if: always()
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "Tests completed for branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
