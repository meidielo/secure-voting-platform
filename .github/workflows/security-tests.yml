name: Security Tests (Docker)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'

env:
  DEPLOYMENT_ENV: testing
  FLASK_ENV: testing
  SECRET_KEY: test-secret-key-do-not-use-in-production
  GEO_FILTER_ENABLED: "False"
  ENABLE_MFA: "False"

jobs:
  security-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Build and start Docker containers
        env:
          DEPLOYMENT_ENV: testing
          FLASK_ENV: testing
          SECRET_KEY: test-secret-key-do-not-use-in-production
          GEO_FILTER_ENABLED: "False"
          ENABLE_MFA: "False"
        run: |
          # Export environment variables so docker compose inherits them
          export DEPLOYMENT_ENV=testing
          export FLASK_ENV=testing
          export SECRET_KEY=test-secret-key-do-not-use-in-production
          export GEO_FILTER_ENABLED=False
          export ENABLE_MFA=False
          
          echo "🐳 Starting Docker containers..."
          docker compose up -d
          
          # Wait for database to be healthy first
          echo "⏳ Waiting for database to be ready..."
          max_attempts=60
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if docker compose exec -T db mysqladmin ping -h localhost -uroot -prootpass 2>/dev/null | grep -q "mysqld is alive"; then
              echo "✅ Database is ready!"
              break
            fi
            attempt=$((attempt + 1))
            if [ $((attempt % 10)) -eq 0 ]; then
              echo "⏳ Database check attempt $attempt/$max_attempts..."
            fi
            sleep 1
          done
          
          if [ $attempt -ge $max_attempts ]; then
            echo "❌ Database failed to become ready"
            docker compose logs db --tail=50
            exit 1
          fi
          
          # Wait for app to respond to health checks
          echo "⏳ Waiting for app to be ready..."
          max_attempts=120
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            # Check if health endpoint responds with 200
            http_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/healthz 2>/dev/null || echo "000")
            if [ "$http_code" = "200" ]; then
              echo "✅ App is ready! (HTTP $http_code)"
              break
            fi
            attempt=$((attempt + 1))
            if [ $((attempt % 20)) -eq 0 ]; then
              echo "⏳ App health check attempt $attempt/$max_attempts... (current HTTP $http_code)"
            fi
            sleep 1
          done
          
          if [ $attempt -ge $max_attempts ]; then
            echo "❌ App failed to become ready after ${max_attempts}s"
            echo "🔍 Checking Docker logs:"
            echo "=== APP LOGS ==="
            docker compose logs web --tail=50
            echo "=== WAF LOGS ==="
            docker compose logs waf --tail=30
            echo "=== DB LOGS ==="
            docker compose logs db --tail=20
            exit 1
          fi
          
          # Add small buffer for full initialization
          sleep 2

      - name: Run health checks
        run: |
          echo "🏥 Running health checks..."
          python -m pytest tests/integration/test_integration.py::TestHealthChecks -v --tb=short --base-url=http://localhost

      - name: Run WAF Security Tests
        run: |
          echo "🛡️ Running WAF security tests..."
          python -m pytest tests/integration/test_waf_security.py -v --tb=short --base-url=http://localhost

      - name: Run Rate Limiting Tests
        run: |
          echo "⚡ Running rate limiting tests..."
          python -m pytest tests/test_vote_rate_limiting.py -v --tb=short

      - name: Run Pagination Security Tests
        run: |
          echo "📄 Running pagination security tests..."
          python -m pytest tests/test_pagination_security.py -v --tb=short

      - name: Collect Docker logs on failure
        if: failure()
        run: |
          echo "❌ Security tests failed. Collecting logs..."
          echo "=== APP LOGS (last 100 lines) ===" > docker-logs.txt
          docker compose logs web --tail=100 >> docker-logs.txt
          echo "=== WAF LOGS (last 50 lines) ===" >> docker-logs.txt
          docker compose logs waf --tail=50 >> docker-logs.txt
          echo "=== DB LOGS (last 30 lines) ===" >> docker-logs.txt
          docker compose logs db --tail=30 >> docker-logs.txt
          cat docker-logs.txt

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-logs
          path: docker-logs.txt

      - name: Stop Docker services
        if: always()
        run: |
          docker compose down -v

      - name: Security Test Report
        if: always()
        run: |
          echo "## Security Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "Security tests completed for branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
