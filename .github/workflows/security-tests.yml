name: Security Tests (Docker)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  security-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Start Docker Compose services
        run: |
          docker-compose up -d
          echo "Waiting for services to be ready..."
          sleep 10
          docker-compose ps

      - name: Run WAF Security Tests
        run: |
          python -m pytest tests/integration/test_waf_security.py -v --tb=short --base-url=http://localhost

      - name: Run Rate Limiting Tests
        run: |
          python -m pytest tests/test_vote_rate_limiting.py -v --tb=short

      - name: Collect Docker logs on failure
        if: failure()
        run: |
          docker-compose logs > docker-logs.txt
          cat docker-logs.txt

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs.txt

      - name: Stop Docker services
        if: always()
        run: |
          docker-compose down
