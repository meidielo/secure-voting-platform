upstream app_upstream { server voting_web:8000; }

# Rate limiting zones - adjusted for testing
limit_req_zone $binary_remote_addr zone=dev:10m rate=100r/m;      # 100 req/min for dev endpoints
limit_req_zone $binary_remote_addr zone=general:10m rate=200r/m;  # 200 req/min - increased for testing
limit_req_zone $binary_remote_addr zone=voting:10m rate=2r/m;    # 2 votes per minute for development

server {
  listen 80;
  server_name _;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self' https://cdn.jsdelivr.net;" always;

  # Hide nginx version
  server_tokens off;

  location / {
    # General rate limiting - burst=50 allows for test suites
    limit_req zone=general burst=50 nodelay;

    proxy_pass http://app_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
  }

  # Stricter rate limiting for voting endpoint - 10 per minute for dev testing
  location /vote {
    limit_req zone=voting;

    proxy_pass http://app_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Local Dev endpoints - IP restriction could be added here
  location /dev/ {
    # Disable ModSecurity for dev endpoints to avoid false positives
    modsecurity off;
    
    # Additional admin protections could go here
    limit_req zone=dev burst=100 nodelay;

    proxy_pass http://app_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}