upstream app_upstream { server voting_web:8000; }

# Rate limiting zones - configurable for testing vs production
# Use TEST_MODE env var to switch between strict and test configurations
# In production: strict rate limiting
# In testing: relaxed rate limiting with bursts
limit_req_zone $binary_remote_addr zone=dev:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=200r/m;

# Strict mode & Test mode
limit_req_zone $binary_remote_addr zone=voting_strict:10m rate=2r/m;
limit_req_zone $binary_remote_addr zone=voting_test:10m rate=10r/m;

server {
  listen 80;
  server_name _;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self' https://cdn.jsdelivr.net;" always;

  # Hide nginx version
  server_tokens off;

  location / {
    # General rate limiting
    limit_req zone=general burst=50 nodelay;

    proxy_pass http://app_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
  }

  # Voting endpoint with dynamic rate limiting
  location /vote {
    # Use test or strict zone based on header
    limit_req zone=voting_strict burst=20 nodelay;

    proxy_pass http://app_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Local Dev endpoints
  location /dev/ {
    # Disable ModSecurity for dev endpoints
    modsecurity off;

    limit_req zone=dev burst=100 nodelay;

    proxy_pass http://app_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}