services:
  web:
    build: ./app
    container_name: voting_web
    ports:
      # 8000 is mapped for direct access (bypass WAF)
      # This would be disabled unless penetration testing of the bare app is being performed
      # - bare testing should be done in a separate isolated environment (like this project)
      # - in production this port would be closed to external access
      # - only the WAF port (80) would be exposed externally
      - "8000:8000" 
    expose:
      - "8000"
    environment:
      DATABASE_URL: mysql+pymysql://votinguser:votingpass@db:3306/votingdb
      GEO_FILTER_ENABLED: "True"
      GEOIP_DB_PATH: /data/GeoLite2-Country.mmdb
      LOG_LEVEL: info
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "vault-dev-token"
      VAULT_MOUNT: "transit"
      VAULT_KV_MOUNT: "kv"
      VAULT_TRANSIT_KEY: "results-signing"
    volumes:
      - ./data:/data
      - ./instance:/instance
    depends_on:
      db:
        condition: service_healthy
      vault:
        condition: service_started
    networks:
      - app_net
      - db_net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}|{{.ImageName}}|{{.ID}}"

  waf:
    image: owasp/modsecurity-crs:nginx
    container_name: voting_waf
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d/waf.conf:/etc/nginx/conf.d/waf.conf:ro
    depends_on:
      - web
    networks:
      - app_net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}|{{.ImageName}}|{{.ID}}"

  db:
    image: mysql:8.0
    platform: linux/amd64
    container_name: voting_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: votingdb
      MYSQL_USER: votinguser
      MYSQL_PASSWORD: votingpass
    volumes:
      - db_data:/var/lib/mysql
      # keep slow query logs on a host path
      # - ./mysql-logs:/var/log/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -prootpass || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - db_net
    ports:
      - "33306:3306"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}|{{.ImageName}}|{{.ID}}"

  vault:
    image: hashicorp/vault:latest
    container_name: voting_vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "vault-dev-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/data
      - ./scripts/vault-init.sh:/vault-init.sh:ro
    command: ["vault", "server", "-dev", "-dev-root-token-id=vault-dev-token", "-dev-listen-address=0.0.0.0:8200"]
    networks:
      - app_net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}|{{.ImageName}}|{{.ID}}"

volumes:
  db_data:
  vault_data:

networks:
  app_net:
  db_net: