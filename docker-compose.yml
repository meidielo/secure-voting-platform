services:
  web:
    build: ./app
    container_name: voting_web
    # Port 8000 is internal only — all external traffic must go through the WAF.
    # For local debugging without WAF, use: docker-compose exec web curl localhost:8000
    expose:
      - "8000"
    environment:
      VOTING_ADMIN_USER: ${VOTING_ADMIN_USER:-voting_admin}
      VOTING_ADMIN_PASS: ${VOTING_ADMIN_PASS:?Set VOTING_ADMIN_PASS in .env}
      VOTING_VOTER_USER: ${VOTING_VOTER_USER:-voting_voter}
      VOTING_VOTER_PASS: ${VOTING_VOTER_PASS:?Set VOTING_VOTER_PASS in .env}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-votinguser}:${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}@db:3306/${MYSQL_DATABASE:-votingdb}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      DEBUG_DB_BIND: ${DEBUG_DB_BIND:-false}
      GEO_FILTER_ENABLED: ${GEO_FILTER_ENABLED:-True}
      GEOIP_DB_PATH: /data/GeoLite2-Country.mmdb
      VOTER_PII_KEY_BASE64: ${VOTER_PII_KEY_BASE64:?Set VOTER_PII_KEY_BASE64 in .env}
      LICENSE_HASH_PEPPER: ${LICENSE_HASH_PEPPER:?Set LICENSE_HASH_PEPPER in .env}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: ${VAULT_TOKEN:-vault-dev-token}
      VAULT_MOUNT: "transit"
      VAULT_KV_MOUNT: "kv"
      VAULT_TRANSIT_KEY: "results-signing"
    volumes:
      - ./data:/data
      - ./instance:/instance
      - ./scripts:/scripts:ro
    depends_on:
      db:
        condition: service_healthy
      vault:
        condition: service_started
    networks:
      - app_net
      - db_net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}|{{.ImageName}}|{{.ID}}"

  waf:
    image: owasp/modsecurity-crs:nginx
    container_name: voting_waf
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d/waf.conf:/etc/nginx/conf.d/waf.conf:ro
    depends_on:
      - web
    networks:
      - app_net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}|{{.ImageName}}|{{.ID}}"

  db:
    image: mysql:8.0
    platform: linux/amd64
    container_name: voting_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-votingdb}
      MYSQL_USER: ${MYSQL_USER:-votinguser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
      MYSQL_DEFAULT_AUTHENTICATION_PLUGIN: caching_sha2_password
    volumes:
      - db_data:/var/lib/mysql
      # keep slow query logs on a host path
      # - ./mysql-logs:/var/log/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - db_net
    # Database is internal only — no host port mapping in production.
    # For local debugging: docker-compose exec db mysql -u votinguser -p votingdb
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}|{{.ImageName}}|{{.ID}}"

  vault:
    image: hashicorp/vault:latest
    container_name: voting_vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "vault-dev-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/data
      - ./scripts/vault-init.sh:/vault-init.sh:ro
    command: ["vault", "server", "-dev", "-dev-root-token-id=vault-dev-token", "-dev-listen-address=0.0.0.0:8200"]
    networks:
      - app_net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "{{.Name}}|{{.ImageName}}|{{.ID}}"

volumes:
  db_data:
  vault_data:

networks:
  app_net:
  db_net: