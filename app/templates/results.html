{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <h2>Election Results</h2>
        
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Candidate</th>
                    <th>Votes</th>
                </tr>
            </thead>
            <tbody>
                {% for candidate, votes in results.items() %}
                <tr>
                    <td>{{ candidate }}</td>
                    <td>{{ votes }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
