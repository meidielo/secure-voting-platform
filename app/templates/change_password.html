{% extends "base.html" %}
{% block title %}Change Password - SecureVote{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="sv-card">
      <div class="card-header">
        <i class="fas fa-key me-2"></i>Change Password
      </div>
      <div class="card-body">
        <form method="POST" action="{{ url_for('password.change_password') }}">
          <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label for="current_password" class="form-label">Current Password</label>
            <input type="password" class="form-control" id="current_password" name="current_password" required>
          </div>
          <div class="mb-3">
            <label for="new_password" class="form-label">New Password</label>
            <input type="password" class="form-control" id="new_password" name="new_password" required minlength="12">
            <div class="form-text" style="font-size:.75rem">
              Min 12 chars with uppercase, lowercase, and a special character.
            </div>
          </div>
          <div class="mb-3">
            <label for="confirm_password" class="form-label">Confirm New Password</label>
            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required minlength="12">
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-check me-1"></i>Change Password
            </button>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
