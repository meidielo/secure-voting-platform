{% extends "base.html" %}
{% block title %}Page Not Found - SecureVote{% endblock %}
{% block content %}
<div class="text-center py-5">
  <h1 class="display-1 fw-bold text-muted">404</h1>
  <h2 class="mb-3">Page Not Found</h2>
  <p class="text-muted mb-4">The page you are looking for does not exist or has been moved.</p>
  <a href="{{ url_for('main.dashboard') if current_user.is_authenticated else url_for('auth.login') }}" class="btn btn-primary">
    <i class="fas fa-home me-1"></i> Go Home
  </a>
</div>
{% endblock %}
