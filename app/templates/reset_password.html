{% extends "base.html" %}
{% block title %}Reset Password - SecureVote{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="card-title text-center mb-4">
          <i class="fas fa-lock me-2"></i>Set New Password
        </h3>
        <form method="POST">
          <div class="mb-3">
            <label for="new_password" class="form-label">New Password</label>
            <input type="password" class="form-control" id="new_password" name="new_password"
                   required minlength="12" aria-describedby="pwdHelp">
            <div id="pwdHelp" class="form-text">
              At least 12 characters with uppercase, lowercase, and a special character.
            </div>
          </div>
          <div class="mb-3">
            <label for="confirm_password" class="form-label">Confirm Password</label>
            <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                   required minlength="12">
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-check me-1"></i> Reset Password
            </button>
          </div>
        </form>
        <div class="text-center mt-3">
          <a href="{{ url_for('auth.login') }}">Back to Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
